  <text x="10" y="58" font-family="Kalnia, &#39;Playfair Display&#39;, serif" font-style="italic" font-weight="600" font-size="64" fill="#00E0FF" filter="url(#glow-cyan)">Roll</text>

  
  <text x="160" y="58" font-family="Kalnia, &#39;Playfair Display&#39;, serif" font-style="italic" font-weight="600" font-size="64" fill="#FF2E6E" filter="url(#glow-pink)">IQ</text>

  
  <path d="M 18 66 Q 140 72 260 66" fill="none" stroke="#FF2E6E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"></path>
